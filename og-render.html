<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0a0a23;
    font-family: 'Courier New', Courier, monospace;
    position: relative;
  }

  /* Subtle grid overlay */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,59,79,0.25) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,59,79,0.25) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Accent glow top-left */
  .glow-tl {
    position: absolute;
    top: -160px;
    left: -160px;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(219,184,255,0.12) 0%, transparent 70%);
  }

  /* Accent glow bottom-right */
  .glow-br {
    position: absolute;
    bottom: -120px;
    right: -120px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(241,190,50,0.10) 0%, transparent 70%);
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 80px;
  }

  .eyebrow {
    font-size: 13px;
    color: #888;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .title-line {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-bottom: 8px;
    line-height: 1;
  }

  .title-bubble {
    font-size: 88px;
    font-weight: bold;
    color: #ffffff;
    letter-spacing: -0.02em;
  }

  .title-tm {
    font-size: 88px;
    font-weight: bold;
    color: #f1be32;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 20px;
    color: #888;
    margin-top: 20px;
    max-width: 680px;
    line-height: 1.6;
    font-family: 'Courier New', monospace;
  }

  .year-row {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 40px;
  }

  .year-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    max-width: 80px;
  }

  .year-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid #3b3b4f;
    background: #1b1b32;
  }

  .year-dot.highlight {
    border-color: #f1be32;
    background: #f1be32;
  }

  .year-label {
    font-size: 12px;
    color: #555;
    white-space: nowrap;
  }

  .year-label.highlight {
    color: #f1be32;
    font-weight: bold;
  }

  .year-line-wrap {
    flex: 1;
    height: 2px;
    background: #3b3b4f;
    margin-bottom: 18px;
  }

  .tags {
    display: flex;
    gap: 10px;
    margin-top: 36px;
  }

  .tag {
    background: #1b1b32;
    border: 1px solid #3b3b4f;
    border-radius: 4px;
    padding: 6px 14px;
    font-size: 13px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tag .icon { font-size: 14px; }

  /* Right side decorative year */
  .deco-year {
    position: absolute;
    right: 64px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 180px;
    font-weight: bold;
    color: rgba(241,190,50,0.07);
    letter-spacing: -0.04em;
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #dbb8ff 0%, #f1be32 50%, #acd157 100%);
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="deco-year">1988</div>

  <div class="container">
    <div class="eyebrow">Interactive History</div>

    <div class="title-line">
      <span class="title-bubble">Bubble&nbsp;</span><span class="title-tm">Time Machine</span>
    </div>

    <div class="subtitle">Japan's economic miracle, City Pop, and the crash&nbsp;—&nbsp;1985 to 1991.</div>

    <div class="year-row">
      <div class="year-node">
        <div class="year-dot"></div>
        <div class="year-label">1985</div>
      </div>
      <div class="year-line-wrap"></div>
      <div class="year-node">
        <div class="year-dot"></div>
        <div class="year-label">1986</div>
      </div>
      <div class="year-line-wrap"></div>
      <div class="year-node">
        <div class="year-dot"></div>
        <div class="year-label">1987</div>
      </div>
      <div class="year-line-wrap"></div>
      <div class="year-node">
        <div class="year-dot highlight"></div>
        <div class="year-label highlight">1988</div>
      </div>
      <div class="year-line-wrap"></div>
      <div class="year-node">
        <div class="year-dot"></div>
        <div class="year-label">1989</div>
      </div>
      <div class="year-line-wrap"></div>
      <div class="year-node">
        <div class="year-dot"></div>
        <div class="year-label">1990</div>
      </div>
      <div class="year-line-wrap"></div>
      <div class="year-node">
        <div class="year-dot"></div>
        <div class="year-label">1991</div>
      </div>
    </div>

    <div class="tags">
      <div class="tag"><span class="icon">🎵</span> Music</div>
      <div class="tag"><span class="icon">📺</span> Anime</div>
      <div class="tag"><span class="icon">🏙️</span> Aesthetic</div>
      <div class="tag"><span class="icon">💹</span> Economy</div>
      <div class="tag"><span class="icon">🏠</span> Daily Life</div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</body>
</html>
